<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Ingredient - Recipe Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <a href="recipes.html">Recipes</a>
    <a href="ingredients.html">Ingredients</a>
    <a href="ingredient-form.html">Add Ingredient</a>
    <a href="login.html">Logout</a>
  </header>

  <div class="container">
    <h1>Add Ingredient</h1>

    <form id="ingredientForm" action="#" method="post">
      <label for="ingName">Ingredient Name</label>
      <input type="text" id="ingName" name="name">
      <small class="error" id="ingNameError"></small>

      <label for="unit">Unit of Measurement</label>
      <select id="unit" name="unit">
        <option value="grams">Grams</option>
        <option value="ml">Millilitres</option>
        <option value="pieces">Pieces</option>
        <option value="tbsp">Tablespoon</option>
      </select>

      <button type="submit">Save Ingredient</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
