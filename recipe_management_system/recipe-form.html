<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Recipe - Recipe Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <a href="recipes.html">Recipes</a>
    <a href="ingredients.html">Ingredients</a>
    <a href="recipe-form.html">Add Recipe</a>
    <a href="login.html">Logout</a>
  </header>

  <div class="container">
    <h1>Add Recipe</h1>

    <form id="recipeForm" action="#" method="post" enctype="multipart/form-data">

      <label for="name">Recipe Name</label>
      <input type="text" id="name" name="name">
      <small class="error" id="nameError"></small>

      <label for="description">Description</label>
      <textarea id="description" name="description" rows="3"></textarea>
      <small class="error" id="descriptionError"></small>

      <div id="ingredientContainer">
        <label for="ingredient1">Ingredient 1</label>
        <input type="text" id="ingredient1" name="ingredient1" placeholder="Ingredient name">
        <input type="number" name="quantity1" placeholder="Quantity" min="1">
        <small class="error" id="quantity1Error"></small>

        <label for="ingredient2">Ingredient 2</label>
        <input type="text" id="ingredient2" name="ingredient2" placeholder="Ingredient name">
        <input type="number" name="quantity2" placeholder="Quantity" min="1">
        <small class="error" id="quantity2Error"></small>
      </div>

      <button type="button" id="addIngredientBtn">+ Add Another Ingredient</button>

      <label for="instructions">Instructions</label>
      <textarea id="instructions" name="instructions" rows="5"></textarea>
      <small class="error" id="instructionsError"></small>

      <label for="image">Upload Image</label>
      <input type="file" id="image" name="image" accept="image/*">

      <button type="submit">Save Recipe</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
